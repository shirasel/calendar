name: Update holidays

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-holidays:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Update holiday data
        run: node update-holidays.js

      - name: Commit updated holiday data
        run: |
          if git diff --quiet -- data/syukujitsu.csv data/holidays.js; then
            echo "No holiday data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/syukujitsu.csv data/holidays.js
          git commit -m "chore: 祝日データを更新"
          git push
